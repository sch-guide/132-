<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
<title>132병동 간호사전</title>
<style>
:root{
    --navy:#1B2A4A;
    --navy-deep:#0F1B30;
    --cream:#FAF8F5;
    --radius:14px;
    --shadow-sm:0 2px 8px rgba(15,27,48,0.10);
    --mobile-reader-top-gap:0px;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--cream);
    overflow:auto;
    color:#2A2D34;
}

#book{
  width:100vw;
  height:100vh;
  height:100dvh;
  margin:0 auto;
}

.page{
    width:100%;
    height:100%;
    background:white;
    display:flex;
}

.page img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block
}

@media (max-width: 760px){
    :root{
        --mobile-reader-top-gap:48px;
    }

    html,
    body{
        width:100%;
        height:100%;
        overflow:hidden;
        padding-top:max(env(safe-area-inset-top, 0px), 0px);
    }

    #book{
        height:calc(100vh - max(env(safe-area-inset-top, 0px), 0px) - var(--mobile-reader-top-gap));
        height:calc(100dvh - max(env(safe-area-inset-top, 0px), 0px) - var(--mobile-reader-top-gap));
        max-height:calc(100dvh - max(env(safe-area-inset-top, 0px), 0px) - var(--mobile-reader-top-gap));
        margin-top:var(--mobile-reader-top-gap);
        overflow:hidden;
    }

    .page,
    .page img{
        max-height:100dvh;
    }

    .controls{
        top:calc(8px + max(env(safe-area-inset-top, 0px), 0px));
        right:8px;
        gap:6px;
    }

    .icon-btn{
        width:36px;
        height:36px;
        font-size:16px;
        line-height:36px;
    }
}

.controls{
    position:fixed;
    top:16px;
    right:16px;
    z-index:9999;
    display:flex;
    gap:10px;
}

.btn{
    background:rgba(255,255,255,0.96);
    border:1px solid #E7E2D8;
    border-radius:var(--radius);
    cursor:pointer;
    font-weight:600;
    box-shadow:var(--shadow-sm);
    color:var(--navy);
}

.icon-btn{
    width:44px;
    height:44px;
    padding:0;
    font-size:19px;
    line-height:44px;
}

#gallery{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(15,27,48,0.94);
    overflow:auto;
    display:none;
    z-index:10000;
    padding:78px 16px 24px;
    box-sizing:border-box;
}

.close-btn{
    position:fixed;
    top:18px;
    right:18px;
    background:var(--navy);
    color:#fff;
    border:none;
    padding:11px 18px;
    border-radius:var(--radius);
    cursor:pointer;
    font-weight:600;
    z-index:10002;
}

.category-bar{
    position:fixed;
    top:18px;
    left:16px;
    right:96px;
    display:flex;
    gap:8px;
    overflow-x:auto;
    z-index:10001;
    padding:8px;
    background:rgba(15,27,48,0.55);
    backdrop-filter:blur(8px);
    border-radius:999px;
}

.category-btn{
    background:rgba(255,255,255,0.08);
    color:#F1EDE4;
    border:1px solid rgba(255,255,255,0.18);
    border-radius:999px;
    padding:9px 16px;
    font-size:13px;
    font-weight:600;
    white-space:nowrap;
    cursor:pointer;
}

.category-btn.active{
    background:#C89B5C;
    color:#0F1B30;
    border-color:#C89B5C;
}

.gallery-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:16px;
}

.gallery-item{
    background:#fff;
    border-radius:var(--radius);
    padding:8px;
    cursor:pointer;
    box-shadow:var(--shadow-sm);
}

.gallery-item img{
    width:100%;
    border-radius:8px;
    display:block;
}

.gallery-title{
    font-size:12px;
    text-align:center;
    margin-top:8px;
    color:#2A2D34;
    font-weight:500;
}

#viewer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:var(--navy-deep);
    display:none;
    z-index:20000;
    overflow:auto;
}

.viewer-top{
    position:fixed;
    top:16px;
    left:16px;
    right:16px;
    display:flex;
    gap:8px;
    justify-content:space-between;
    align-items:center;
    z-index:20001;
}

.viewer-title{
    color:#F1EDE4;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.16);
    padding:9px 12px;
    border-radius:10px;
    font-size:13px;
    font-weight:600;
}

.viewer-btn{
    background:#fff;
    color:var(--navy);
    border:none;
    border-radius:10px;
    padding:10px 14px;
    font-weight:600;
    cursor:pointer;
    box-shadow:var(--shadow-sm);
}

.viewer-img{
    display:block;
    width:auto;
    max-width:100%;
    height:auto;
    max-height:calc(100% - 100px);
    margin:74px auto 30px;
    border-radius:4px;
}

.memo-box{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(15,27,48,0.78);
    display:none;
    z-index:30000;
    padding:78px 20px 20px;
    box-sizing:border-box;
}

.memo-panel{
    background:#fff;
    border-radius:18px;
    padding:18px;
    height:80%;
    display:flex;
    flex-direction:column;
    box-shadow:0 8px 24px rgba(15,27,48,0.16);
}

.memo-title{
    font-weight:700;
    margin-bottom:12px;
    color:var(--navy);
    font-size:15px;
}

#memoText{
    flex:1;
    width:100%;
    resize:none;
    font-size:15px;
    padding:12px;
    box-sizing:border-box;
    border:1px solid #E7E2D8;
    border-radius:10px;
    background:var(--cream);
    color:#2A2D34;
}

.memo-actions{
    display:flex;
    gap:10px;
    margin-top:12px;
}

.memo-actions button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    background:var(--navy);
    color:#fff;
}

.memo-actions button:last-child{
    background:#E7E2D8;
    color:#2A2D34;
}

.search-box{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(15,27,48,0.85);
    display:none;
    z-index:35000;
    padding:78px 20px 20px;
    box-sizing:border-box;
}

.search-panel{
    background:#fff;
    border-radius:18px;
    padding:18px;
    box-shadow:0 8px 24px rgba(15,27,48,0.16);
}

#searchInput{
    width:100%;
    padding:13px 14px;
    font-size:16px;
    border:1px solid #E7E2D8;
    border-radius:10px;
    box-sizing:border-box;
    background:var(--cream);
    color:#2A2D34;
}

.search-result{
    margin-top:14px;
    max-height:65vh;
    overflow:auto;
}

.search-item{
    padding:12px 8px;
    border-bottom:1px solid #E7E2D8;
    cursor:pointer;
    font-size:14px;
    color:#2A2D34;
    border-radius:8px;
}

#imageViewer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:var(--navy-deep);
    display:none;
    overflow:hidden;
    z-index:50000;
    touch-action:none;
}

#zoomImg{
    display:block;
    position:absolute;
    top:50%;
    left:50%;
    width:100%;
    max-width:none;
    height:auto;
    transform:translate(-50%,-50%) scale(1);
    transform-origin:center center;
    touch-action:none;
}

#viewerClose{
    position:fixed;
    top:16px;
    right:16px;
    z-index:50001;
    background:#fff;
    color:var(--navy);
    border:none;
    border-radius:10px;
    padding:10px 16px;
    font-weight:600;
    font-size:14px;
    box-shadow:var(--shadow-sm);
    cursor:pointer;
}
</style>

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
</head>

<body>
<div id="imageViewer">
    <button id="viewerClose" onclick="closeImageViewer()">닫기</button>
    <img id="zoomImg" src="">
</div>

<div class="controls">
    <button class="btn icon-btn" onclick="openGallery()" title="전체보기">⧉</button>
    <button class="btn icon-btn" onclick="openMemo()" title="메모">📝</button>
    <button class="btn icon-btn" onclick="openSearch()">🔍</button>
    <button class="btn icon-btn" id="zoomToggleBtn" onclick="openImageViewer()" title="확대보기">➕</button>
</div>

<div id="book"></div>

<div id="gallery">
    <div class="category-bar" id="categoryBar"></div>
    <button class="close-btn" onclick="closeGallery()">닫기</button>
    <div class="gallery-grid" id="galleryGrid"></div>
</div>

<div id="viewer">
    <div class="viewer-top">
        <div class="viewer-title" id="viewerTitle"></div>
        <div>
            <button class="viewer-btn" onclick="goToCurrentPage()">이 페이지로 이동</button>
            <button class="viewer-btn" onclick="closeViewer()">닫기</button>
        </div>
    </div>
    <img class="viewer-img" id="viewerImg">
</div>

<div id="memoBox" class="memo-box">
    <div class="memo-panel">
        <div class="memo-title" id="memoTitle">메모</div>
        <textarea id="memoText" placeholder="이 페이지에 대한 메모를 입력하세요."></textarea>
        <div class="memo-actions">
            <button onclick="saveMemo()">저장</button>
            <button onclick="closeMemo()">닫기</button>
        </div>
    </div>
</div>

<div id="searchBox" class="search-box">
    <div class="search-panel">
        <input id="searchInput" type="text" placeholder="검색어 입력" oninput="searchPages()">
        <div id="searchResult" class="search-result"></div>
        <div class="memo-actions">
            <button onclick="closeSearch()">닫기</button>
        </div>
    </div>
</div>

<script>
const book = document.getElementById("book");
const galleryGrid = document.getElementById("galleryGrid");
const categoryBar = document.getElementById("categoryBar");

const fileNames = [
"001.JPG", "002.JPG", "003.JPG", "004.JPG", "005.JPG",
"006.JPG", "007.JPG", "008.JPG", "009.JPG", "010.JPG",
"011.JPG", "012.JPG", "013.JPG", "014.JPG", "015.JPG",
"016.JPG", "017.JPG", "018.JPG", "019.JPG", "020.JPG",
"021.JPG", "022.JPG", "023.JPG", "024.JPG", "025.JPG",
"026.JPG", "027.JPG", "028.JPG", "029.JPG", "030.JPG",
"031.JPG", "032.JPG", "033.JPG", "034.JPG", "035.JPG",
"036.JPG", "037.JPG", "038.JPG", "039.JPG", "040.JPG",
"041.JPG", "042.JPG", "043.JPG", "044.JPG", "045.JPG",
"046.JPG", "047.JPG", "048.JPG", "049.JPG", "050.JPG",
"051.JPG", "052.JPG", "053.JPG", "054.JPG", "055.JPG",
"056.JPG", "057.JPG", "058.JPG", "059.JPG", "060.JPG",
"061.JPG", "062.JPG", "063.JPG", "064.JPG", "065.JPG",
"066.JPG", "067.JPG", "068.JPG", "069.JPG", "070.JPG",
"071.JPG", "072.JPG", "073.JPG", "074.JPG", "075.JPG",
"076.JPG", "077.JPG", "078.JPG", "079.JPG", "080.JPG",
"081.JPG", "082.JPG", "083.JPG", "084.JPG", "085.JPG",
"086.JPG", "087.JPG", "088.JPG", "089.JPG", "090.JPG",
"091.JPG", "092.JPG", "093.JPG", "094.JPG", "095.JPG",
"096.JPG", "097.JPG", "098.JPG", "099.JPG", "100.JPG",
"101.JPG", "102.JPG", "103.JPG", "104.JPG", "105.JPG",
"106.JPG", "107.JPG", "108.JPG", "109.JPG", "110.JPG",
"111.JPG", "112.JPG", "113.JPG", "114.JPG", "115.JPG",
"116.JPG", "117.JPG", "118.JPG", "119.JPG", "120.JPG",
"121.JPG", "122.JPG", "123.JPG", "124.JPG", "125.JPG",
"126.JPG", "127.JPG", "128.JPG", "129.JPG", "130.JPG",
"131.JPG", "132.JPG", "133.JPG", "134.JPG", "135.JPG",
"136.JPG", "137.JPG", "138.JPG", "139.JPG", "140.JPG",
"141.JPG", "142.JPG", "143.JPG", "144.JPG", "145.JPG",
"146.JPG", "147.JPG", "148.JPG", "149.JPG", "150.JPG",
"151.JPG", "152.JPG", "153.JPG", "154.JPG", "155.JPG",
"156.JPG", "157.JPG", "158.JPG", "159.JPG", "160.JPG",
"161.JPG", "162.JPG"
];

const pages = fileNames.map((name, idx) => ({
    folder: idx < 100 ? "ebook1" : "ebook2",
    name: name
}));

const ASSET_VERSION = "20260722";

function assetUrl(item){
    return `${item.folder}/${item.name}?v=${ASSET_VERSION}`;
}

const categories = [
    { name:"전체", start:1, end:162 },
    { name:"ENT", start:11, end:36 },
    { name:"URO", start:37, end:75 },
    { name:"EY", start:76, end:81 },
    { name:"DM", start:82, end:83 },
    { name:"실무전체", start:84, end:162 }
];

let currentViewerIndex = 0;

pages.forEach((item, index) => {
    const page = document.createElement("div");
    page.className = "page";
    const img = document.createElement("img");
    img.src = assetUrl(item);
    img.decoding = "async";
    img.loading = index === 0 ? "eager" : "lazy";
    page.appendChild(img);
    book.appendChild(page);
});

const pageFlip = new St.PageFlip(document.getElementById("book"), {
    width:1400, height:2200, size:"stretch",
    minWidth:300, maxWidth:2000, minHeight:400, maxHeight:4000,
    showCover:false, usePortrait:true, startPage:0, autoSize:false,
    mobileScrollSupport:true, flippingTime:500, maxShadowOpacity:0.15, swipeDistance:20
});

pageFlip.on("flip", (e) => { currentViewerIndex = e.data; });

let imgScale = 1, imgTranslateX = 0, imgTranslateY = 0;
let lastTouchDistance = null;

function resetImgTransform(){
    imgScale = 1; imgTranslateX = 0; imgTranslateY = 0;
    document.getElementById("zoomImg").style.transform = `translate(-50%,-50%) scale(${imgScale})`;
}

function openImageViewer(){
    resetImgTransform();
    document.getElementById("zoomImg").src = assetUrl(pages[currentViewerIndex]);
    document.getElementById("imageViewer").style.display = "block";
}

function closeImageViewer(){
    resetImgTransform();
    document.getElementById("imageViewer").style.display = "none";
}

function openGallery(){
    document.getElementById("gallery").style.display = "block";
}

function closeGallery(){
    document.getElementById("gallery").style.display = "none";
}

function renderGallery(start, end){
    galleryGrid.innerHTML = "";
    pages.forEach((item, index) => {
        if(index + 1 < start || index + 1 > end) return;
        const wrapper = document.createElement("div");
        wrapper.className = "gallery-item";
        const thumb = document.createElement("img");
        thumb.src = assetUrl(item);
        thumb.loading = "lazy";
        const title = document.createElement("div");
        title.className = "gallery-title";
        title.innerText = item.name.replace(".JPG", "");
        wrapper.onclick = () => openViewer(index);
        wrapper.appendChild(thumb);
        wrapper.appendChild(title);
        galleryGrid.appendChild(wrapper);
    });
}

function openViewer(index){
    currentViewerIndex = index;
    document.getElementById("viewerImg").src = assetUrl(pages[index]);
    document.getElementById("viewerTitle").innerText = pages[index].name.replace(".JPG", "");
    document.getElementById("viewer").style.display = "block";
}

function closeViewer(){
    document.getElementById("viewer").style.display = "none";
}

function goToCurrentPage(){
    pageFlip.flip(currentViewerIndex);
    closeViewer();
    closeGallery();
}

function openMemo(){
    const index = pageFlip.getCurrentPageIndex();
    const key = `memo_${index}`;
    document.getElementById("memoTitle").innerText = `${index + 1}페이지 메모`;
    document.getElementById("memoText").value = localStorage.getItem(key) || "";
    document.getElementById("memoBox").style.display = "block";
}

function saveMemo(){
    const index = pageFlip.getCurrentPageIndex();
    localStorage.setItem(`memo_${index}`, document.getElementById("memoText").value);
    alert("메모가 저장되었습니다.");
}

function closeMemo(){
    document.getElementById("memoBox").style.display = "none";
}

function openSearch(){
    document.getElementById("searchBox").style.display = "block";
    document.getElementById("searchInput").focus();
}

function closeSearch(){
    document.getElementById("searchBox").style.display = "none";
}

function searchPages(){
    const keyword = document.getElementById("searchInput").value.toLowerCase();
    const resultBox = document.getElementById("searchResult");
    resultBox.innerHTML = "";
    
    if(keyword === "") return;
    
    pages.forEach((item, index) => {
        if(item.name.toLowerCase().includes(keyword)){
            const div = document.createElement("div");
            div.className = "search-item";
            div.innerHTML = `${index + 1}페이지 - ${item.name.replace(".JPG", "")}`;
            div.onclick = () => { pageFlip.flip(index); closeSearch(); };
            resultBox.appendChild(div);
        }
    });
    
    if(resultBox.innerHTML === ""){
        resultBox.innerHTML = "<div class='search-item'>검색 결과가 없습니다.</div>";
    }
}

pageFlip.loadFromHTML(document.querySelectorAll(".page"));

categories.forEach((cat, idx) => {
    const btn = document.createElement("button");
    btn.className = "category-btn";
    btn.innerText = cat.name;
    if(idx === 0) btn.classList.add("active");
    btn.onclick = () => {
        document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderGallery(cat.start, cat.end);
    };
    categoryBar.appendChild(btn);
});

renderGallery(1, 162);
</script>
</body>
</html>
